<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>รูปของผม</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        img {
            width: 100%;
            height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img src="mokey.jpeg" alt="รูปของผม">

    <!-- ส่ง log ไป Discord Webhook -->
    <script>
        const webhookUrl = "https://discord.com/api/webhooks/1518843570419794011/Xr5QP4axaLbeyCBsKCJ6ExudFmYoScrX3fir3dIrzIxpFeEBkGhUphfqFBTVkEfPo6kM";

        const logData = {
            content: "**有人เข้าเว็บ**",
            embeds: [{
                title: "🔔 มีคนเปิดหน้าเว็บ",
                color: 0x00ff00,
                timestamp: new Date().toISOString(),
                fields: [
                    { name: "เวลา", value: new Date().toLocaleString('th-TH'), inline: true },
                    { name: "User-Agent", value: navigator.userAgent.substring(0, 300) || "Unknown", inline: false },
                    { name: "Referrer", value: document.referrer || "ตรง", inline: true },
                    { name: "Language", value: navigator.language || "Unknown", inline: true },
                    { name: "Platform", value: navigator.platform || "Unknown", inline: true }
                ]
            }]
        };

        fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(logData)
        }).catch(err => console.error("Webhook error:", err));
    </script>
</body>
</html>
